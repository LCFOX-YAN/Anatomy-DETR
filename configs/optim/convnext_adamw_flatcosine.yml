use_amp: True

scaler:
  type: GradScaler
  enabled: True

use_ema: True
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 400
  start: 0

epoches: 50
clip_max_norm: 0.1

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.00001

    - params: '^(?=.*backbone)(?=.*(?:norm|bn)).*$'
      lr: 0.00001
      weight_decay: 0.

    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

    # Learnable prior gates / fusion weights / risk-map residuals: keep them free of weight decay
    # so the L2 anchor (loss_risk_reg) and softplus init fully control their scale (#4/#5/#11).
    - params: '^(?=.*(?:prior_bias_raw|risk_score_fusion_raw|risk_score_bias|q_residual|p_residual|sampling_pos_step|offset_scale_logit|group_pos_embed|uv_pos_proj|head_prior_gate_raw|contrast_delta|tooth_class_bias)).*$'
      weight_decay: 0.



  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.000125


lrsheduler: flatcosine
lr_gamma: 0.2
warmup_iter: 400
flat_epoch: 20
no_aug_epoch: 10


